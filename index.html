<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#006241" />
  <title>Partner Hub</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <img src="assets/partner-hub-logo.png" alt="Partner Hub" class="logo" />
    <div><h1>Partner Hub</h1><p>Todo el talento de Centro Norte en un solo lugar</p></div>
  </header>

  <section class="filters card">
    <label>Región<select id="regionFilter"></select></label>
    <label>Mes<select id="monthFilter"></select></label>
    <label>Tienda<select id="storeFilter"></select></label>
  </section>

  <nav class="tabs">
    <button class="tab active" data-tab="partners">Partner</button>
    <button class="tab" data-tab="anniv">Aniversarios</button>
    <button class="tab" data-tab="birth">Cumpleaños</button>
  </nav>

  <main>
    <section id="partners" class="panel active">
      <div class="grid">
        <div class="card kpis"><h2>Resumen de tienda</h2><div id="kpis"></div></div>
        <div class="card"><h2>% Hombres / Mujeres</h2><div class="gender"><div class="donut" id="donut">0%</div><div id="genderLegend"></div></div></div>
      </div>
      <div class="card"><h2>Partners por jerarquía</h2><input id="partnerSearch" class="search" placeholder="Buscar partner o # empleado"/><div id="partnerList"></div></div>
    </section>

    <section id="anniv" class="panel">
      <div class="card slide"><h2>Happy Anniversary · <span class="monthName"></span></h2><input id="annivSearch" class="search" placeholder="Filtrar Nombre de Partner | Tienda | # años"/><div id="annivList"></div></div>
    </section>

    <section id="birth" class="panel">
      <div class="card slide"><h2>Happy Birthday · <span class="monthName"></span></h2><input id="birthSearch" class="search" placeholder="Filtrar Nombre de Partner | Tienda | Día"/><div id="birthList"></div></div>
    </section>
  </main>

  <dialog id="detailDialog"><div id="detailBox"></div><button onclick="detailDialog.close()">Cerrar</button></dialog>
  <script src="data/partners.js"></script>
  <script src="app.js"></script>
</body>
</html>
